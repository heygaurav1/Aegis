<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Solana Validator UI</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0f;
            --card-bg: rgba(255, 255, 255, 0.03);
            --accent: #14f195;
            --accent-glow: rgba(20, 241, 149, 0.4);
            --purple: #9945ff;
            --purple-glow: rgba(153, 69, 255, 0.4);
            --text-primary: #ffffff;
            --text-secondary: #a0a0b0;
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            background: var(--bg);
            color: var(--text-primary);
            font-family: 'Outfit', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(153, 69, 255, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(20, 241, 149, 0.05) 0%, transparent 40%);
        }

        .header {
            width: 100%;
            padding: 40px 0;
            text-align: center;
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 2.5rem;
            font-weight: 600;
            background: linear-gradient(135deg, var(--purple), var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 16px;
            border-radius: 100px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            margin-top: 15px;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #666;
            box-shadow: 0 0 10px rgba(100, 100, 100, 0.5);
        }

        .status-dot.online {
            background: var(--accent);
            box-shadow: 0 0 10px var(--accent-glow);
        }

        .main-container {
            width: 100%;
            max-width: 1200px;
            padding: 40px 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 24px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 32px;
            backdrop-filter: blur(20px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--border), transparent);
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .card h2 {
            margin: 0 0 20px 0;
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .btn {
            background: linear-gradient(135deg, var(--purple), var(--accent));
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: 12px;
            font-family: inherit;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            font-size: 1rem;
            margin-top: 10px;
        }

        .btn:hover {
            opacity: 0.9;
            transform: scale(0.98);
            box-shadow: 0 0 20px var(--purple-glow);
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            color: white;
            padding: 14px;
            border-radius: 12px;
            font-family: 'JetBrains Mono', monospace;
            box-sizing: border-box;
            transition: all 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.08);
        }

        .result-box {
            margin-top: 20px;
            padding: 16px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid var(--border);
            white-space: pre-wrap;
            color: var(--accent);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
        }

        .stat-value {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .footer {
            margin-top: auto;
            padding: 40px;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card { animation: fadeIn 0.6s ease-out forwards; }
        .card:nth-child(2) { animation-delay: 0.1s; }
        .card:nth-child(3) { animation-delay: 0.2s; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">MINI SOLANA VALIDATOR</div>
        <div class="status-badge">
            <div id="status-dot" class="status-dot"></div>
            <span id="status-text">Connecting...</span>
        </div>
    </div>

    <div class="main-container">
        <!-- Stats Card -->
        <div class="card">
            <h2>Network Status</h2>
            <div class="stats-grid">
                <div class="stat-item">
                    <span class="stat-label">Slot</span>
                    <span id="stat-slot" class="stat-value">-</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Version</span>
                    <span id="stat-version" class="stat-value">-</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Tx Count</span>
                    <span id="stat-txs" class="stat-value">-</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Identity</span>
                    <span id="stat-id" class="stat-value" style="font-size: 0.7rem; overflow-wrap: break-word;">-</span>
                </div>
            </div>
            <button class="btn" onclick="refreshStats()" style="margin-top: 24px;">Refresh Network</button>
        </div>

        <!-- Airdrop Card -->
        <div class="card">
            <h2>Request Airdrop</h2>
            <div class="input-group">
                <label>Receiver Wallet Address</label>
                <input type="text" id="airdrop-address" placeholder="Enter Solana Address">
            </div>
            <div class="input-group">
                <label>Amount (Lamports)</label>
                <input type="number" id="airdrop-amount" value="1000000000">
            </div>
            <button class="btn" onclick="requestAirdrop()">Claim Airdrop</button>
            <div id="airdrop-result" class="result-box" style="display: none;"></div>
        </div>

        <!-- Account Info Card -->
        <div class="card">
            <h2>Account Lookup</h2>
            <div class="input-group">
                <label>Public Key</label>
                <input type="text" id="lookup-address" placeholder="Enter Wallet/Program Address">
            </div>
            <button class="btn" onclick="lookupAccount()">Fetch Info</button>
            <div id="lookup-result" class="result-box" style="display: none;"></div>
        </div>
    </div>

    <div class="footer">
        Solana Localhost Validator • Designed with Elegance
    </div>

    <script>
        const endpoint = 'http://localhost:3000';

        async function rpc(method, params = []) {
            try {
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        jsonrpc: '2.0',
                        id: 1,
                        method,
                        params
                    })
                });
                const data = await response.json();
                if (data.error) throw new Error(data.error.message);
                return data.result;
            } catch (err) {
                console.error(err);
                throw err;
            }
        }

        async function checkStatus() {
            const dot = document.getElementById('status-dot');
            const text = document.getElementById('status-text');
            try {
                const health = await rpc('getHealth');
                if (health === 'ok') {
                    dot.classList.add('online');
                    text.innerText = 'ONLINE';
                    return true;
                }
            } catch (err) {
                dot.classList.remove('online');
                text.innerText = 'OFFLINE';
                return false;
            }
        }

        async function refreshStats() {
            try {
                const slot = await rpc('getSlot');
                const version = await rpc('getVersion');
                const txCount = await rpc('getTransactionCount');
                const identity = await rpc('getIdentity');

                document.getElementById('stat-slot').innerText = slot;
                document.getElementById('stat-version').innerText = version['solana-core'];
                document.getElementById('stat-txs').innerText = txCount;
                document.getElementById('stat-id').innerText = identity.identity;
            } catch (err) {
                console.error("Stats fail", err);
            }
        }

        async function requestAirdrop() {
            const addr = document.getElementById('airdrop-address').value;
            const amount = parseInt(document.getElementById('airdrop-amount').value);
            const box = document.getElementById('airdrop-result');
            
            if (!addr) return alert("Enter address");

            box.style.display = 'block';
            box.innerText = 'Processing...';

            try {
                const sig = await rpc('requestAirdrop', [addr, amount]);
                box.innerText = `Success!\nSignature: ${sig}`;
                refreshStats();
            } catch (err) {
                box.innerText = `Error: ${err.message}`;
            }
        }

        async function lookupAccount() {
            const addr = document.getElementById('lookup-address').value;
            const box = document.getElementById('lookup-result');
            
            if (!addr) return alert("Enter address");

            box.style.display = 'block';
            box.innerText = 'Searching...';

            try {
                const info = await rpc('getAccountInfo', [addr]);
                box.innerText = JSON.stringify(info, null, 2);
            } catch (err) {
                box.innerText = `Error: ${err.message}`;
            }
        }

        // Init
        setInterval(checkStatus, 5000);
        checkStatus().then(online => {
            if (online) refreshStats();
        });
    </script>
</body>
</html>
